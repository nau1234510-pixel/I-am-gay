
                
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #87ceeb; touch-action: none; }
        #alpha-notice { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.7); color: #fc0; text-align: center; font-size: 11px; padding: 6px 0; z-index: 100; border-bottom: 1px solid #fc0; }
        #ui { position: absolute; top: 45px; left: 15px; color: white; font-size: 20px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); z-index: 10; font-weight: bold; }
        #progress-container { position: absolute; top: 80px; left: 15px; width: 180px; height: 12px; background: rgba(0,0,0,0.3); border: 2px solid #f0f; display: none; border-radius: 6px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #f0f; }
        .joystick { position: absolute; bottom: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.15); border-radius: 50%; z-index: 20; border: 2px solid rgba(255,255,255,0.3); }
        #move-joy { left: 30px; }
        #look-joy { right: 30px; }
        .stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%,-50%); pointer-events: none; }
    </style>
</head>
<body>
    <div id="alpha-notice">Альфа версія. Повідомити про баги: nau1234510@gmail.com</div>
    <div id="ui">ЗАТРАХАНО: <span id="counter">0</span></div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="move-joy" class="joystick"><div class="stick"></div></div>
    <div id="look-joy" class="joystick"><div class="stick"></div></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        const obstacles = [];
        const grass = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.MeshStandardMaterial({ color: 0x3d8c40 }));
        grass.rotation.x = -Math.PI / 2;
        scene.add(grass);

        function addTree(x, z) {
            const g = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 4), new THREE.MeshStandardMaterial({ color: 0x4b3621 }));
            trunk.position.y = 2;
            const top = new THREE.Mesh(new THREE.SphereGeometry(2.5), new THREE.MeshStandardMaterial({ color: 0x2d5a27 }));
            top.position.y = 5;
            g.add(trunk, top); g.position.set(x, 0, z);
            scene.add(g); obstacles.push({ x, z, r: 1.8 });
        }

        for (let i = -190; i <= 190; i += 20) {
            for (let j = -190; j <= 190; j += 20) {
                if (Math.random() > 0.4) {
                    const ox = (Math.random()-0.5)*12, oz = (Math.random()-0.5)*12;
                    if (Math.abs(i+ox) > 8 || Math.abs(j+oz) > 8) addTree(i+ox, j+oz);
                }
            }
        }

        function createMan(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1.0), new THREE.MeshStandardMaterial({ color }));
            body.position.y = 1.1;
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            head.position.y = 2.0;
            g.add(body, head); return g;
        }

        const player = createMan(0xff00ff);
        scene.add(player);

        const npcs = [];
        for (let i = 0; i < 45; i++) {
            const n = createMan(0x00ccff);
            n.position.set((Math.random()-0.5)*360, 0, (Math.random()-0.5)*360);
            n.userData = { active: true, progress: 0, vel: new THREE.Vector3((Math.random()-0.5)*0.1, 0, (Math.random()-0.5)*0.1) };
            npcs.push(n); scene.add(n);
        }

        let yaw = 0, pitch = 0.2, score = 0;
        const moveData = { x: 0, y: 0 }, lookData = { x: 0, y: 0 };

        const setupJoy = (id, data) => {
            const el = document.getElementById(id);
            const stick = el.querySelector('.stick');
            let aid = null;
            const handle = (e) => {
                const t = Array.from(e.changedTouches).find(t => aid === null || t.identifier === aid);
                if (!t) return; aid = t.identifier;
                const r = el.getBoundingClientRect();
                let dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
                const d = Math.sqrt(dx*dx+dy*dy);
                if (d > 50) { dx *= 50/d; dy *= 50/d; }
                data.x = dx/50; data.y = dy/50;
                stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                e.preventDefault();
            };
            el.addEventListener('touchstart', handle, {passive: false});
            el.addEventListener('touchmove', handle, {passive: false});
            el.addEventListener('touchend', (e) => { aid = null; data.x = 0; data.y = 0; stick.style.transform = 'translate(-50%,-50%)'; });
        };

        setupJoy('move-joy', moveData);
        setupJoy('look-joy', lookData);

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            yaw -= lookData.x * 0.06;
            pitch = Math.max(-0.4, Math.min(0.6, pitch - lookData.y * 0.04));

            const fx = Math.sin(yaw), fz = Math.cos(yaw);
            const rx = Math.cos(yaw), rz = -Math.sin(yaw);
            const s = 16 * dt;
            let sx = (fx * -moveData.y * s) + (rx * -moveData.x * s);
            let sz = (fz * -moveData.y * s) + (rz * -moveData.x * s);

            const check = (tx, tz) => {
                if (Math.abs(tx) > 198 || Math.abs(tz) > 198) return true;
                return obstacles.some(o => Math.sqrt((tx-o.x)**2 + (tz-o.z)**2) < o.r);
            };

            if (!check(player.position.x + sx, player.position.z)) player.position.x += sx;
            if (!check(player.position.x, player.position.z + sz)) player.position.z += sz;
            player.rotation.y = yaw;

            camera.position.set(player.position.x - fx*9, player.position.y + 4.5 + pitch*5, player.position.z - fz*9);
            camera.lookAt(player.position.x, player.position.y + 1.2, player.position.z);

            let near = false;
            npcs.forEach(n => {
                if (!n.userData.active) return;
                if (player.position.distanceTo(n.position) < 2.2) {
                    near = true; n.lookAt(player.position.x, 0, player.position.z);
                    player.children[0].position.z = Math.sin(Date.now()*0.025)*0.5;
                    n.userData.progress += dt * 0.65;
                    document.getElementById('progress-container').style.display = 'block';
                    document.getElementById('progress-bar').style.width = (Math.min(n.userData.progress, 1)*100)+'%';
                    if (n.userData.progress >= 1) {
                        n.userData.active = false;
                        n.children[0].children[0].material.color.set(0x444444);
                        n.rotation.x = Math.PI/2.1;
                        score++; document.getElementById('counter').innerText = score;
                    }
                } else {
                    const nx = n.position.x + n.userData.vel.x, nz = n.position.z + n.userData.vel.z;
                    if (check(nx, nz)) { n.userData.vel.x *= -1; n.userData.vel.z *= -1; }
                    else n.position.set(nx, 0, nz);
                    n.lookAt(n.position.x+n.userData.vel.x, 0, n.position.z+n.userData.vel.z);
                }
            });

            if (!near) {
                player.children[0].position.set(0,0,0);
                document.getElementById('progress-container').style.display = 'none';
            }
            renderer.render(scene, camera);
        }
        animate();
        window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
